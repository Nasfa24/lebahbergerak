<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lebah Bergerak - Cairkan Poin</title>
    
    <link rel="icon" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f41d.svg" type="image/svg+xml">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* TAMPILAN ASLI (TIDAK ADA YANG DIUBAH) */
        :root { --pkb-green: #03754c; --pkb-orange: #FF9c08; --pkb-yellow: #fff212; --pkb-white: #fefefe; --pkb-black: #000000; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--pkb-green); color: var(--pkb-black); padding-bottom: 30px; }
        
        .app-header { background-color: var(--pkb-green); color: var(--pkb-yellow); padding: 15px 20px; text-align: center; font-size: 20px; font-weight: bold; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid rgba(255,242,18,0.3); box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .container { max-width: 500px; margin: 30px auto; padding: 0 15px; }
        
        .form-card { background-color: var(--pkb-white); border-radius: 15px; padding: 35px 20px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-weight: 700; margin-bottom: 5px; color: var(--pkb-green); font-size: 13px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; background-color: #fafafa; transition: 0.3s; }
        input:focus, select:focus { outline: none; border-color: var(--pkb-orange); background-color: var(--pkb-white); }
        
        .btn-submit { background-color: var(--pkb-orange); color: var(--pkb-white); font-size: 16px; padding: 16px; width: 100%; border: none; border-radius: 8px; font-weight: bold; margin-top: 20px; text-transform: uppercase; cursor: pointer; box-shadow: 0 4px 6px rgba(255, 156, 8, 0.3); }
        .btn-submit:active { transform: scale(0.98); }
        
        /* TOMBOL MATI JIKA POIN KURANG */
        .btn-submit:disabled { background-color: #ccc; cursor: not-allowed; box-shadow: none; color: #666; }
        
        .info-saldo { text-align: center; margin-bottom: 20px; color: var(--pkb-green); }
        .info-saldo h2 { font-size: 36px; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="app-header">
        <i class="fa-solid fa-wallet"></i> CAIRKAN POIN
    </div>

    <div class="container">
        <div class="form-card">
            
            <div class="info-saldo">
                <span style="font-weight: bold; font-size: 12px; color: #888; text-transform: uppercase;">Saldo Poin Anda</span>
                <h2 id="display_saldo">0</h2>
                <p id="msg_limit" style="font-size: 12px; color: #d33; margin-top: 5px; font-weight: bold; display: none;">
                    <i class="fa-solid fa-circle-exclamation"></i> Minimal saldo 200 untuk mencairkan.
                </p>
            </div>
            
            <form id="formCair">
                <div class="form-group">
                    <label>Jumlah Poin yang Dicairkan</label>
                    <input type="number" id="poinDiminta" required placeholder="Minimal 200 Poin">
                </div>
                <div class="form-group">
                    <label>Metode Pembayaran</label>
                    <select id="metode_bayar" required>
                        <option value="DANA">DANA</option>
                        <option value="GOPAY">GOPAY</option>
                        <option value="OVO">OVO</option>
                        <option value="TRANSFER BANK">TRANSFER BANK</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Nomor Rekening / E-Wallet</label>
                    <input type="number" id="nomor_rekening" required placeholder="Contoh: 0812xxxx">
                </div>
                <div class="form-group">
                    <label>Nama Pemilik Rekening</label>
                    <input type="text" id="atas_nama" required placeholder="Nama sesuai aplikasi/buku tabungan">
                </div>
                
                <button type="submit" id="btn_submit" class="btn-submit">Ajukan Pencairan</button>
            </form>
            
            <div style="text-align: center; margin-top: 25px;">
                <a href="dashboard.html" style="color: var(--pkb-green); text-decoration: none; font-weight: bold; font-size: 14px;">
                    <i class="fa-solid fa-arrow-left"></i> Kembali ke Dashboard
                </a>
            </div>
            
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwLTOtf-mLruCzz6MbYjtMX0pQGaAPxHzQwa8Khz6hZInquHNLcg9zYs9DGKHhGSf6DEQ/exec";
        let saldoAktif = 0;

        window.onload = function() {
            const userData = JSON.parse(localStorage.getItem('lebah_kader_data'));
            if(!userData) { window.location.href = "index.html"; return; }

            // Ambil Saldo Real-time
            fetch(GAS_URL, {
                method: 'POST', mode: 'cors',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: "get_saldo", id_kader: userData.id_kader })
            })
            .then(res => res.json())
            .then(data => {
                saldoAktif = data.saldo || 0;
                document.getElementById('display_saldo').innerText = saldoAktif;
                
                // Cek syarat 200 poin
                if(saldoAktif < 200) {
                    document.getElementById('btn_submit').disabled = true;
                    document.getElementById('msg_limit').style.display = 'block';
                }
            });
        };

        document.getElementById('formCair').addEventListener('submit', function(e) {
            e.preventDefault();
            const poinDiminta = parseInt(document.getElementById('poinDiminta').value);

            if (poinDiminta < 200) {
                Swal.fire('Gagal', 'Minimal pencairan adalah 200 poin.', 'error');
                return;
            }
            if (poinDiminta > saldoAktif) {
                Swal.fire('Gagal', 'Saldo Anda tidak mencukupi.', 'error');
                return;
            }

            Swal.fire({ title: 'Memproses Pencairan...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
            
            const kaderData = JSON.parse(localStorage.getItem('lebah_kader_data'));
            
            const payload = {
                action: "withdraw_poin",
                id_kader: kaderData.id_kader,
                poin_dicairkan: poinDiminta,
                metode_bayar: document.getElementById('metode_bayar').value,
                nomor_rekening: document.getElementById('nomor_rekening').value,
                atas_nama: document.getElementById('atas_nama').value
            };

            fetch(GAS_URL, { 
                method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) 
            })
            .then(() => {
                Swal.fire({ 
                    icon: 'success', 
                    title: 'Pengajuan Berhasil!', 
                    text: 'Tim logistik akan segera memproses pencairan Anda ke rekening tujuan.', 
                    confirmButtonColor: '#03754c' 
                }).then(() => { 
                    window.location.href = "dashboard.html"; 
                });
            }).catch(error => {
                Swal.fire({ icon: 'error', title: 'Gagal Mengirim', text: 'Periksa koneksi internet Anda.', confirmButtonColor: '#03754c' });
            });
        });
    </script>
</body>
</html>
