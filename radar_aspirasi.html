<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Aspirasi - Lebah Bergerak</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; margin: 0; padding-bottom: 30px; }
        .header { background-color: #dc3545; color: #fff; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 100;}
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .form-group { margin-bottom: 15px; }
        label { font-size: 13px; font-weight: bold; color: #333; display: block; margin-bottom: 5px; }
        select, textarea, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        .btn-gps { background-color: #0dcaf0; color: #000; border: none; padding: 10px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-bottom: 10px;}
        .btn-submit { background-color: #dc3545; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 16px; width: 100%; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 6px rgba(220,53,69,0.3); }
        .back-btn { display: block; text-align: center; margin-top: 20px; color: #03754c; text-decoration: none; font-weight: bold; }
        .gps-status { font-size: 12px; color: #dc3545; text-align: center; font-weight: bold;}
    </style>
</head>
<body>
    <div class="header"><i class="fa-solid fa-satellite-dish"></i> RADAR ASPIRASI</div>
    
    <div class="container">
        <div style="background:#fff; padding:15px; border-radius:10px; margin-bottom:20px; border-left:4px solid #dc3545; font-size:12px; color:#555;">
            <b>Instruksi:</b> Kirim keluhan warga. Data akan langsung masuk ke Markas Pusat.
        </div>

        <div class="form-group">
            <label>Sumber Aspirasi:</label>
            <select id="sumber_aspirasi" onchange="toggleNamaWarga()">
                <option value="warga_umum" style="font-weight:bold; color:#dc3545;">🌐 Warga Umum / Non-Binaan</option>
            </select>
        </div>

        <div class="form-group" id="box_nama_warga">
            <label>Nama Warga / Lokasi Laporan:</label>
            <input type="text" id="nama_warga" placeholder="Contoh: Pak RT 4 / Pasar Rungkut">
        </div>

        <div class="form-group">
            <label>Tulis Keluhan / Curhatan (Gunakan bahasa bebas):</label>
            <textarea id="teks_aspirasi" rows="4" placeholder="Ketik persis seperti yang diucapkan warga..."></textarea>
        </div>

        <div class="form-group">
            <button type="button" class="btn-gps" onclick="ambilGPS()"><i class="fa-solid fa-location-crosshairs"></i> Ambil Titik Koordinat</button>
            <div id="gps_status" class="gps-status">GPS Belum Terkunci ❌</div>
            <input type="hidden" id="gps_koordinat">
        </div>

        <button class="btn-submit" id="btn_kirim" onclick="kirimAspirasi()">Kirim ke Markas Pusat <i class="fa-solid fa-paper-plane"></i></button>

        <a href="dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Batal & Kembali</a>
    </div>

    <script>
        // ================= KREDENSIAL SUPABASE =================
        const SUPABASE_URL = "https://hvbrskchlpemypawpqjn.supabase.co/rest/v1";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2YnJza2NobHBlbXlwYXdwcWpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MzYzNzksImV4cCI6MjA5MjUxMjM3OX0.0NCroyTHROeQ3SNKOTNZS1H1hxrGy5wGTLGWm5YdOdo"; 

        const headersConfig = {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json'
        };
        let user;

        window.onload = function() {
            user = JSON.parse(localStorage.getItem('lebah_kader_data'));
            if(!user) { window.location.href = "index.html"; return; }

            // Tarik daftar binaan (Approved) dari Supabase
            const queryUrl = `${SUPABASE_URL}/master_pemilih?id_kader_pic=eq.${user.id_kader}&status_validasi=eq.Approved&select=nik,nama_lengkap,nama_institusi`;
            fetch(queryUrl, { method: 'GET', headers: headersConfig })
            .then(res => res.json())
            .then(data => {
                if(data.length > 0) {
                    const select = document.getElementById('sumber_aspirasi');
                    data.forEach(aktor => {
                        let opt = document.createElement('option');
                        opt.value = aktor.nik;
                        opt.text = "👤 " + aktor.nama_lengkap + " (" + (aktor.nama_institusi || 'Warga Umum') + ")";
                        select.appendChild(opt);
                    });
                }
            });
        };

        function toggleNamaWarga() {
            const val = document.getElementById('sumber_aspirasi').value;
            document.getElementById('box_nama_warga').style.display = (val === 'warga_umum') ? 'block' : 'none';
        }

        function ambilGPS() {
            if (navigator.geolocation) {
                Swal.fire({ title: 'Mencari Satelit...', text: 'Tunggu sebentar', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        Swal.close();
                        document.getElementById('gps_koordinat').value = position.coords.latitude + ", " + position.coords.longitude;
                        document.getElementById('gps_status').innerHTML = "GPS Terkunci ✅";
                        document.getElementById('gps_status').style.color = "#198754";
                    },
                    (error) => { Swal.fire("Gagal", "Nyalakan GPS Anda dan berikan izin lokasi.", "error"); },
                    { enableHighAccuracy: true }
                );
            } else {
                Swal.fire("Error", "Browser HP Anda tidak mendukung GPS.", "error");
            }
        }

        // ================= SUBMIT ASPIRASI KE SUPABASE =================
        function kirimAspirasi() {
            const idAktor = document.getElementById('sumber_aspirasi').value;
            const teks = document.getElementById('teks_aspirasi').value;
            const gps = document.getElementById('gps_koordinat').value;
            let namaWargaInput = "";

            if (idAktor === 'warga_umum') {
                namaWargaInput = document.getElementById('nama_warga').value;
                if(namaWargaInput === "") { Swal.fire("Wajib Diisi", "Tuliskan nama warga atau lokasi kejadian.", "warning"); return; }
            } else {
                const sel = document.getElementById('sumber_aspirasi');
                namaWargaInput = sel.options[sel.selectedIndex].text.replace("👤 ", "");
            }

            if(teks.length < 10) { Swal.fire("Terlalu Singkat", "Tulis keluhan dengan lebih jelas.", "warning"); return; }
            if(gps === "") { Swal.fire("GPS Kosong", "Klik tombol Ambil Titik Koordinat terlebih dahulu.", "warning"); return; }

            Swal.fire({ title: 'Mengirim Laporan...', text: 'Menyampaikan sandi ke pusat', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });

            const payload = {
                id_kader: user.id_kader,
                nama_kader: user.nama,
                sumber_aspirasi: idAktor,
                nama_warga: namaWargaInput,
                keluhan: teks,
                koordinat_gps: gps,
                status: "Pending" // Menunggu review admin
            };

            fetch(`${SUPABASE_URL}/data_aspirasi`, {
                method: 'POST', headers: headersConfig, body: JSON.stringify(payload)
            }).then(response => {
                if(response.ok) {
                    Swal.fire({ icon: 'success', title: 'Radar Berhasil!', text: 'Aspirasi telah diserap dan diteruskan ke Markas.', confirmButtonColor: '#03754c' })
                    .then(() => { window.location.href = "dashboard.html"; });
                } else {
                    throw new Error("Gagal mengirim");
                }
            }).catch(e => {
                Swal.fire("Sistem Sibuk", "Gagal menghubungi pusat, coba lagi.", "error");
            });
        }
    </script>
</body>
</html>
