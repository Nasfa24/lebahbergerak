<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lebah Bergerak - Cairkan Poin</title>
    
    <link rel="icon" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f41d.svg" type="image/svg+xml">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --pkb-green: #03754c; --pkb-orange: #FF9c08; --pkb-yellow: #fff212; --pkb-white: #fefefe; --pkb-black: #000000; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--pkb-green); color: var(--pkb-black); padding-bottom: 30px; }
        
        .app-header { background-color: var(--pkb-green); color: var(--pkb-yellow); padding: 15px 20px; text-align: center; font-size: 20px; font-weight: bold; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid rgba(255,242,18,0.3); box-shadow: 0 4px 6px rgba(0,0,0,0.2); display: flex; justify-content: space-between; align-items: center; }
        .btn-back { color: var(--pkb-white); font-size: 16px; cursor: pointer; background: rgba(0,0,0,0.2); padding: 6px 12px; border-radius: 20px; text-decoration: none; display: flex; align-items: center; gap: 5px; }
        .container { max-width: 500px; margin: 20px auto; padding: 0 15px; }
        
        .form-card { background-color: var(--pkb-white); border-radius: 15px; padding: 25px 20px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 700; margin-bottom: 5px; color: var(--pkb-green); font-size: 13px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; background-color: #fafafa; transition: 0.3s; }
        input:focus, select:focus { outline: none; border-color: var(--pkb-orange); background-color: var(--pkb-white); }
        
        .saldo-box { background: linear-gradient(135deg, #FF9c08, #e68a00); color: white; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(255, 156, 8, 0.3); }
        .saldo-box h4 { margin-bottom: 5px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .saldo-box h1 { font-size: 36px; margin: 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
        
        .btn-submit { background-color: var(--pkb-green); color: var(--pkb-yellow); font-size: 16px; padding: 16px; width: 100%; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; text-transform: uppercase; cursor: pointer; box-shadow: 0 4px 6px rgba(3, 117, 76, 0.3); }
        .btn-submit:active { transform: scale(0.98); }
        .help-text { font-size: 11px; color: #666; margin-top: 4px; display: block; }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="btn-back" onclick="window.location.href='dashboard.html'"><i class="fa-solid fa-arrow-left"></i> Kembali</div>
        <div style="width: 80px;"></div>
    </div>

    <div class="container">
        <div class="form-card">
            <div style="text-align: center; margin-bottom: 20px;">
                <i class="fa-solid fa-wallet" style="font-size: 40px; color: var(--pkb-orange);"></i>
                <h3 style="color: var(--pkb-green); margin-top: 10px;">Cairkan Poin</h3>
                <p style="font-size: 12px; color: #666;">Konversi keringat perjuangan Anda menjadi saldo logistik.</p>
            </div>

            <div class="saldo-box">
                <h4>Saldo Aktif Anda</h4>
                <h1 id="display_saldo">...</h1>
                <p style="font-size: 12px; margin-top: 5px; opacity: 0.9;">Poin</p>
            </div>
            
            <form id="formWithdraw">
                <input type="hidden" id="saldo_maksimal">

                <div class="form-group">
                    <label>Jumlah Poin yang Dicairkan</label>
                    <input type="number" id="poin_dicairkan" name="poin_dicairkan" required placeholder="Contoh: 200" min="200">
                    <span class="help-text">*Minimal pencairan 200 Poin.</span>
                </div>

                <div class="form-group">
                    <label>Metode Pencairan</label>
                    <select id="metode_bayar" name="metode_bayar" required>
                        <option value="">-- Pilih Bank / E-Wallet --</option>
                        <option value="BCA">Bank BCA</option>
                        <option value="Mandiri">Bank Mandiri</option>
                        <option value="BRI">Bank BRI</option>
                        <option value="BNI">Bank BNI</option>
                        <option value="BSI">Bank BSI</option>
                        <option value="GoPay">GoPay</option>
                        <option value="OVO">OVO</option>
                        <option value="DANA">DANA</option>
                        <option value="ShopeePay">ShopeePay</option>
                        <option value="Tunai">Tunai (Ambil di Posko)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Nomor Rekening / HP (E-Wallet)</label>
                    <input type="number" id="nomor_rekening" name="nomor_rekening" required placeholder="Ketik nomor tujuan">
                </div>

                <div class="form-group">
                    <label>Atas Nama Pemilik Rekening</label>
                    <input type="text" id="atas_nama" name="atas_nama" required placeholder="Sesuai buku tabungan / aplikasi">
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fa-solid fa-money-bill-transfer"></i> Ajukan Pencairan
                </button>
            </form>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwLTOtf-mLruCzz6MbYjtMX0pQGaAPxHzQwa8Khz6hZInquHNLcg9zYs9DGKHhGSf6DEQ/exec";

        // ================= CEK KEAMANAN & TARIK SALDO =================
        window.onload = function() {
            const kaderData = localStorage.getItem('lebah_kader_data');
            
            if(!kaderData) {
                window.location.href = "index.html";
                return;
            }

            const user = JSON.parse(kaderData);
            
            Swal.fire({ title: 'Mengecek Brankas...', text: 'Mengambil saldo terbaru dari pusat', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
            
            fetch(GAS_URL, {
                method: 'POST', mode: 'cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: "get_saldo", id_kader: user.id_kader })
            })
            .then(res => res.json())
            .then(data => {
                Swal.close();
                if(data.status === "sukses") {
                    document.getElementById('display_saldo').innerText = data.saldo;
                    document.getElementById('saldo_maksimal').value = data.saldo; 
                    
                    // UBAH VALIDASI AWAL MENJADI 200
                    if(data.saldo < 200) {
                        Swal.fire({ icon: 'warning', title: 'Saldo Kurang', text: 'Minimal saldo untuk dicairkan adalah 200 Poin. Ayo giat bergerak lagi!', confirmButtonColor: '#03754c' })
                        .then(() => { window.location.href = "dashboard.html"; });
                    }
                } else {
                    Swal.fire('Error', 'Gagal memuat saldo', 'error');
                }
            })
            .catch(err => {
                Swal.fire('Error', 'Gagal menghubungi server.', 'error');
            });
        };

        // ================= SUBMIT PENCAIRAN =================
        document.getElementById('formWithdraw').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const poinDiminta = parseInt(document.getElementById('poin_dicairkan').value);
            const saldoMaksimal = parseInt(document.getElementById('saldo_maksimal').value);

            // Validasi: Tidak boleh kurang dari 200 (pengaman ganda)
            if(poinDiminta < 200) {
                return Swal.fire({ icon: 'error', title: 'Minimal 200 Poin', text: 'Anda harus mencairkan minimal 200 Poin.', confirmButtonColor: '#FF9c08' });
            }

            // Validasi: Tidak boleh menarik lebih dari saldo yang ada
            if(poinDiminta > saldoMaksimal) {
                return Swal.fire({ icon: 'error', title: 'Saldo Tidak Cukup', text: `Anda hanya bisa mencairkan maksimal ${saldoMaksimal} Poin.`, confirmButtonColor: '#FF9c08' });
            }

            Swal.fire({ title: 'Memproses Pencairan...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
            
            const kaderData = JSON.parse(localStorage.getItem('lebah_kader_data'));
            
            const payload = {
                action: "withdraw_poin",
                id_kader: kaderData.id_kader,
                poin_dicairkan: poinDiminta,
                metode_bayar: document.getElementById('metode_bayar').value,
                nomor_rekening: document.getElementById('nomor_rekening').value,
                atas_nama: document.getElementById('atas_nama').value
            };

            fetch(GAS_URL, { 
                method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) 
            })
            .then(() => {
                Swal.fire({ 
                    icon: 'success', 
                    title: 'Pengajuan Berhasil!', 
                    text: 'Tim logistik akan segera memproses pencairan Anda ke rekening tujuan.', 
                    confirmButtonColor: '#03754c' 
                }).then(() => { 
                    window.location.href = "dashboard.html"; 
                });
            }).catch(error => {
                Swal.fire({ icon: 'error', title: 'Gagal Mengirim', text: 'Periksa koneksi internet Anda.', confirmButtonColor: '#FF9c08' });
            });
        });
    </script>
</body>
</html>
